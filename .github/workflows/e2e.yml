name: E2E Tests

# Triggered manually from the GitHub Actions tab.
# A passing run is required before a PR can be merged
# (configure "E2E Tests / e2e" as a required status check in
#  Settings → Branches → main → Branch protection rules).
on:
  workflow_dispatch:
    inputs:
      api-level:
        description: 'Android API level for the emulator (default: 33)'
        default: '33'
        required: false

jobs:
  e2e:
    name: Standard workflow E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable KVM for hardware-accelerated emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build debug APK and test APK
        run: ./gradlew assembleDebug assembleDebugAndroidTest --no-daemon

      - name: Run E2E test on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ github.event.inputs.api-level || '33' }}
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: >
            ./gradlew connectedDebugAndroidTest
            -Pandroid.testInstrumentationRunnerArguments.class=com.clubdarts.e2e.StandardWorkflowTest
            --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: app/build/outputs/androidTest-results/
          retention-days: 30
